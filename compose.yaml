services:
  postgres:
    image: postgres:16-alpine
    container_name: study-orbit-postgres
    environment:
      POSTGRES_DB: studyorbit
      POSTGRES_USER: studyorbit
      POSTGRES_PASSWORD: studyorbit
    ports:
      - "5432:5432"
    volumes:
      - study-orbit-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyorbit -d studyorbit"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  study-orbit-postgres-data:
